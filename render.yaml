services:
  - type: web
    name: stackly-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DNS_SERVERS
        value: 8.8.8.8,1.1.1.1
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: EMAIL_DELIVERY_MODE
        value: console
      - key: SMS_PROVIDER
        value: mock
      - key: PAYMENT_PRIMARY_PROVIDER
        value: razorpay
      - key: RAZORPAY_MODE
        value: test
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
